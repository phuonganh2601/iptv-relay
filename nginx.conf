worker_processes auto;

events {}

rtmp {

    server {

        listen 1935;
        chunk_size 4096;

        application live {

            live on;
            record off;

            hls on;
            hls_path /var/hls;
            hls_fragment 4;
            hls_playlist_length 20;

        }
    }
}

http {

    server {

        listen 8151;

        location / {

            root /var/hls;

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }

            add_header Cache-Control no-cache;

        }
    }
}